name: Semantic Release

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  FC5_XML_URL: https://github.com/vidalvanbergen/FightClub5eXML/releases/download/nightly/Complete_Compendium_5e.xml

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate FC5 compendium packs
        run: |
          mkdir -p tmp
          curl --fail --location --show-error "$FC5_XML_URL" --output tmp/Complete_Compendium_5e.xml
          npm run generate:fc5-compendia

      - name: Run semantic release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./node_modules/.bin/semantic-release
